<!DOCTYPE html>
<html>
<head>
    <title>Dynamic Card Builder</title>
    <style>
        * {
            font-family: Arial, Helvetica, sans-serif;
        }

        .container {
            padding: 10px;
        }

        .card {
            width: 100%;
            height: 150px;
            border: 2px solid black;
            margin: 10px;
            display: flex;
        }

        .thumbnail {
            width: 300px;
            height: 100%;
            position: relative;
        }

        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .duration {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: black;
            color: white;
            padding: 3px 6px;
            font-size: 12px;
            border-radius: 4px;
        }

        .details {
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-left: 20px;
        }

        .details h2 {
            margin: 0;
        }

        .details p {
            margin-top: 5px;
            color: gray;
        }
    </style>
</head>

<body>

<div class="container">
    <div class="card">
        <div class="thumbnail">
            <img id="thumbnail-img" src="">
            <div class="duration" id="duration"></div>
        </div>

        <div class="details">
            <h2 id="title"></h2>
            <p id="sub-details"></p>
        </div>
    </div>
</div>

<script>
    function buildCard(title, cName, views, monthsOld, duration, thumbnail) {

        document.getElementById("thumbnail-img").src = thumbnail;
        document.getElementById("title").innerText = title;
        document.getElementById("duration").innerText = duration;

        let views_str = "";

        if (views >= 1000000) {
            views_str = (views / 1000000).toFixed(1) + "M";
        } else if (views >= 1000) {
            views_str = (views / 1000).toFixed(1) + "K";
        } else {
            views_str = views;
        }

        document.getElementById("sub-details").innerText =
            `${cName} · ${views_str} views · ${monthsOld} months ago`;
    }

    // ✅ Call function
    buildCard(
        "Introduction to Python Programming",
        "CodingMadeEasy",
        20000,
        5,
        "25:10",
        "https://wallpapers.com/images/hd/coding-1920-x-1080-picture-lt6nbnt1psvjper2.jpg"
    );
</script>

</body>
</html>
